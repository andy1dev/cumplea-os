<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feliz Cumpleaños, Mary</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Cormorant Garamond',serif;
  background:#070012;
  display:flex;align-items:center;justify-content:center;
  -webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale
}
canvas#stars{
  position:fixed;inset:0;z-index:0;
  display:block;width:100%;height:100%
}
#root{
  position:relative;z-index:1;
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  padding:20px
}
.radial-glow{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse 55% 45% at 50% 50%, rgba(180,130,255,0.08) 0%, rgba(255,107,157,0.04) 30%, transparent 70%)
}
.card{
  position:relative;z-index:2;
  width:100%;max-width:520px;
  background:linear-gradient(160deg,rgba(18,8,40,0.6),rgba(12,3,28,0.7));
  backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);
  border:1px solid rgba(200,170,255,0.1);
  border-radius:32px;
  padding:clamp(36px,6vw,52px) clamp(28px,5vw,44px);
  text-align:center;
  box-shadow:
    0 0 80px rgba(40,20,100,0.25),
    0 0 180px rgba(255,107,157,0.04),
    inset 0 1px 0 rgba(200,170,255,0.06);
  transition:all 0.8s cubic-bezier(0.22,1,0.36,1)
}
.card::before{
  content:'';position:absolute;inset:-1px;border-radius:32px;z-index:-1;
  background:linear-gradient(160deg,rgba(200,170,255,0.06),transparent 50%,rgba(255,107,157,0.04));
  pointer-events:none
}
.card.revealed{
  background:linear-gradient(160deg,rgba(22,10,48,0.7),rgba(15,5,32,0.8));
  border-color:rgba(255,215,0,0.12);
  box-shadow:
    0 0 100px rgba(40,20,100,0.35),
    0 0 200px rgba(255,107,157,0.08),
    inset 0 1px 0 rgba(255,215,0,0.08)
}
.name{
  font-family:'Great Vibes',cursive;
  font-size:clamp(52px,11vw,92px);
  line-height:1.1;
  background:linear-gradient(135deg,#f8e8b0 0%,#ffd700 40%,#ffb8d0 70%,#c084fc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  margin-bottom:4px;
  animation:fadeSlideUp 0.9s ease-out both;
  filter:drop-shadow(0 4px 30px rgba(255,215,0,0.15))
}
.subtitle{
  font-family:'Playfair Display',serif;
  font-style:italic;
  font-size:clamp(15px,2vw,20px);
  color:rgba(200,170,255,0.45);
  letter-spacing:0.18em;
  margin-bottom:44px;
  animation:fadeSlideUp 0.9s ease-out 0.2s both
}
.reveal-btn{
  position:relative;
  display:inline-flex;align-items:center;gap:10px;
  font-family:'Playfair Display',serif;
  font-size:clamp(17px,2.2vw,23px);
  font-weight:600;font-style:italic;
  color:#fff;
  padding:16px 48px;
  border:none;border-radius:60px;
  cursor:pointer;
  background:linear-gradient(135deg,rgba(255,107,157,0.3),rgba(180,130,255,0.3));
  border:1px solid rgba(255,215,0,0.15);
  box-shadow:0 0 50px rgba(255,107,157,0.12),inset 0 1px 0 rgba(255,255,255,0.08);
  transition:all 0.5s cubic-bezier(0.22,1,0.36,1);
  animation:fadeSlideUp 0.9s ease-out 0.35s both;
  overflow:hidden
}
.reveal-btn::before{
  content:'';position:absolute;inset:0;border-radius:60px;
  background:linear-gradient(135deg,#ff6b9d,#b482ff,#ffd700);
  opacity:0;transition:opacity 0.5s ease
}
.reveal-btn:hover::before{opacity:1}
.reveal-btn:hover{
  transform:scale(1.04);
  box-shadow:0 0 70px rgba(255,107,157,0.25),inset 0 1px 0 rgba(255,255,255,0.12)
}
.reveal-btn:active{transform:scale(0.97)}
.reveal-btn span{position:relative;z-index:1}
.reveal-btn .icon{position:relative;z-index:1;font-size:1.2em}
.reveal-btn.fade-out{opacity:0;transform:scale(0.85) translateY(10px);pointer-events:none}
.greeting{
  font-family:'Great Vibes',cursive;
  font-size:clamp(38px,7vw,62px);
  line-height:1.15;
  margin-bottom:20px;
  opacity:0;transform:translateY(20px);
  transition:all 0.8s cubic-bezier(0.22,1,0.36,1)
}
.greeting.show{opacity:1;transform:translateY(0)}
.greeting .line1{
  background:linear-gradient(135deg,#f8e8b0,#ffd700,#ffb8d0);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  filter:drop-shadow(0 2px 16px rgba(255,215,0,0.15))
}
.greeting .line2{
  background:linear-gradient(135deg,#ffb8d0,#ff6b9d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text
}
.divider{
  width:50px;height:1.5px;
  background:linear-gradient(90deg,transparent,rgba(255,215,0,0.3),transparent);
  margin:18px auto;
  opacity:0;transition:all 0.8s ease 0.35s
}
.divider.show{opacity:1}
.message{
  font-family:'Cormorant Garamond',serif;
  font-size:clamp(17px,2.2vw,21px);
  line-height:1.7;
  color:rgba(248,240,255,0.8);
  max-width:420px;margin:0 auto;
  opacity:0;transform:translateY(16px);
  transition:all 0.8s cubic-bezier(0.22,1,0.36,1) 0.5s
}
.message.show{opacity:1;transform:translateY(0)}
.message p{margin-bottom:14px}
.message p:last-child{margin-bottom:0}
.message .highlight{
  color:#ffd700;font-weight:500;font-style:italic
}
.music-ctrl{
  display:inline-flex;align-items:center;gap:8px;
  margin-top:18px;
  font-family:'Playfair Display',serif;
  font-size:clamp(13px,1.6vw,16px);
  font-weight:500;font-style:italic;
  color:rgba(248,240,255,0.55);
  padding:10px 28px;
  border:1px solid rgba(255,215,0,0.08);
  border-radius:40px;
  cursor:pointer;
  background:rgba(255,215,0,0.03);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  opacity:0;transform:translateY(8px);
  transition:all 0.5s cubic-bezier(0.22,1,0.36,1) 1.2s;
  box-shadow:0 0 20px rgba(255,215,0,0.02)
}
.music-ctrl.show{opacity:1;transform:translateY(0)}
.music-ctrl:hover{
  border-color:rgba(255,215,0,0.2);
  background:rgba(255,215,0,0.06);
  color:#fff;
  box-shadow:0 0 30px rgba(255,215,0,0.05)
}
.music-ctrl:active{transform:scale(0.96)}
.music-ctrl.playing{
  border-color:rgba(255,107,157,0.18);
  background:rgba(255,107,157,0.05);
  box-shadow:0 0 25px rgba(255,107,157,0.04)
}
.music-ctrl.playing:hover{
  border-color:rgba(255,107,157,0.28);
  background:rgba(255,107,157,0.08)
}
.music-ctrl-icon{font-size:1.15em;line-height:1}
.pulse-dot{
  display:inline-block;width:6px;height:6px;border-radius:50%;
  background:#ff6b9d;
  margin-right:2px;
  animation:pulseDot 1.2s ease-in-out infinite
}
.pulse-dot:nth-child(2){animation-delay:0.2s}
.pulse-dot:nth-child(3){animation-delay:0.4s}
@keyframes pulseDot{
  0%,100%{opacity:0.2;transform:scale(0.8)}
  50%{opacity:1;transform:scale(1.1)}
}
.particle{
  position:fixed;z-index:100;pointer-events:none;
  border-radius:50%;
  animation:particleFly var(--duration) ease-out var(--delay) forwards;
  opacity:0
}
@keyframes particleFly{
  0%{transform:translate(0,0) scale(0);opacity:0}
  8%{opacity:1;transform:translate(calc(var(--dx)*0.08),calc(var(--dy)*0.08)) scale(1)}
  45%{opacity:0.7;transform:translate(calc(var(--dx)*0.55),calc(var(--dy)*0.55)) scale(0.6)}
  100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(0)}
}
.petal{
  position:fixed;z-index:0;pointer-events:none;
  width:14px;height:18px;border-radius:50% 0 50% 0;
  background:linear-gradient(135deg,rgba(255,184,208,0.2),rgba(255,107,157,0.12));
  opacity:0;
  animation:petalFloat var(--dur) ease-in-out var(--del) infinite
}
@keyframes petalFloat{
  0%{transform:translate(0,0) rotate(0deg) scale(0);opacity:0}
  10%{opacity:0.35;transform:translate(15px,30px) rotate(25deg) scale(1)}
  50%{opacity:0.25;transform:translate(70px,130px) rotate(110deg) scale(0.7)}
  80%{opacity:0.1;transform:translate(120px,250px) rotate(200deg) scale(0.4)}
  100%{transform:translate(180px,380px) rotate(280deg) scale(0);opacity:0}
}
@keyframes fadeSlideUp{
  from{opacity:0;transform:translateY(22px)}
  to{opacity:1;transform:translateY(0)}
}
@media(max-width:500px){
  .card{padding:28px 20px;border-radius:24px}
  .reveal-btn{padding:14px 32px;font-size:17px}
  .music-ctrl{padding:8px 20px;font-size:13px;margin-top:14px}
}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<div class="radial-glow"></div>
<audio id="bg-music" src="cancion.mp3" loop preload="auto"></audio>
<div id="root"></div>

<script>
(function(){
  var c=document.getElementById('stars'),ctx=c.getContext('2d');
  var stars=[],W,H,animId;
  function resize(){
    W=c.width=window.innerWidth;
    H=c.height=window.innerHeight;
  }
  window.addEventListener('resize',resize);
  resize();
  for(var i=0;i<350;i++){
    stars.push({
      x:Math.random()*W,y:Math.random()*H,
      r:Math.random()*1.6+0.3,
      a:Math.random()*0.5+0.25,
      spd:Math.random()*0.006+0.002,
      phase:Math.random()*Math.PI*2
    });
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    var grad=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.7);
    grad.addColorStop(0,'rgba(22,8,55,1)');
    grad.addColorStop(0.4,'rgba(10,2,25,1)');
    grad.addColorStop(1,'rgba(4,0,10,1)');
    ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);
    for(var i=0;i<stars.length;i++){
      var s=stars[i];
      var alpha=s.a*(0.5+0.5*Math.sin(t*s.spd+s.phase));
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle='rgba(255,255,255,'+alpha+')';
      ctx.fill();
      if(s.r>1.0){
        ctx.beginPath();
        ctx.arc(s.x,s.y,s.r*3,0,Math.PI*2);
        ctx.fillStyle='rgba(200,170,255,'+(alpha*0.06)+')';
        ctx.fill();
      }
    }
    animId=requestAnimationFrame(draw);
  }
  animId=requestAnimationFrame(draw);
})();
</script>

<script type="text/babel">
const { useState, useCallback, useEffect } = React;

function Particle({ x, y, dx, dy, size, color, delay, duration }) {
  return (
    <div className="particle" style={{
      left: x, top: y, width: size, height: size,
      background: color,
      '--dx': dx+'px', '--dy': dy+'px',
      '--delay': delay+'s', '--duration': duration+'s'
    }} />
  );
}

function Petal({ left, top, delay, duration, size }) {
  return (
    <div className="petal" style={{
      left: left+'%', top: top+'%',
      width: size+'px', height: (size*1.3)+'px',
      '--del': delay+'s', '--dur': duration+'s'
    }} />
  );
}

function App() {
  const [revealed, setRevealed] = useState(false);
  const [revealing, setRevealing] = useState(false);
  const [particles, setParticles] = useState([]);
  const [petals, setPetals] = useState([]);
  const [musicPlaying, setMusicPlaying] = useState(false);

  const spawnParticles = useCallback(() => {
    const cx = window.innerWidth / 2;
    const cy = window.innerHeight / 2;
    const colors = ['#ffd700','#ff6b9d','#b482ff','#f8e8b0','#ffb8d0','#ffffff','#c084fc'];
    const p = [];
    for (let i = 0; i < 70; i++) {
      const angle = Math.random() * Math.PI * 2;
      const dist = 80 + Math.random() * 350;
      p.push({
        id: i,
        x: cx + (Math.random()-0.5)*40,
        y: cy + (Math.random()-0.5)*40,
        dx: Math.cos(angle) * dist,
        dy: Math.sin(angle) * dist,
        size: 2 + Math.random() * 7,
        color: colors[Math.floor(Math.random() * colors.length)],
        delay: Math.random() * 0.12,
        duration: 1.0 + Math.random() * 0.8
      });
    }
    setParticles(p);
  }, []);

  const spawnPetals = useCallback(() => {
    const p = [];
    for (let i = 0; i < 15; i++) {
      p.push({
        id: i,
        left: 5 + Math.random() * 90,
        top: -5 - Math.random() * 15,
        delay: Math.random() * 5,
        duration: 7 + Math.random() * 5,
        size: 9 + Math.random() * 10
      });
    }
    setPetals(p);
    setTimeout(() => setPetals([]), 25000);
  }, []);

  const handleReveal = useCallback(() => {
    setRevealing(true);
    setTimeout(() => {
      setRevealed(true);
      spawnParticles();
      spawnPetals();
      const audio = document.getElementById('bg-music');
      if (audio) {
        audio.currentTime = 0;
        audio.play().catch(() => {});
        setMusicPlaying(true);
      }
    }, 600);
  }, [spawnParticles, spawnPetals]);

  const toggleMusic = useCallback(() => {
    const audio = document.getElementById('bg-music');
    if (!audio) return;
    if (audio.paused) {
      audio.play().catch(() => {});
      setMusicPlaying(true);
    } else {
      audio.pause();
      setMusicPlaying(false);
    }
  }, []);

  return (
    <>
      {particles.map(p => (
        <Particle key={p.id} x={p.x} y={p.y} dx={p.dx} dy={p.dy}
          size={p.size} color={p.color} delay={p.delay} duration={p.duration} />
      ))}
      {petals.map(p => (
        <Petal key={p.id} left={p.left} top={p.top}
          delay={p.delay} duration={p.duration} size={p.size} />
      ))}
      <div className={'card'+(revealed?' revealed':'')}>
        {!revealed ? (
          <>
            <div className="name">Mary</div>
            <div className="subtitle">✦ Hoy es tu día ✦</div>
            <button className={'reveal-btn'+(revealing?' fade-out':'')}
              onClick={handleReveal} disabled={revealing}>
              <span className="icon">✨</span>
              <span>Abrir sorpresa</span>
              <span className="icon">✨</span>
            </button>
          </>
        ) : (
          <>
            <div className={'greeting'+(revealed?' show':'')}>
              <div className="line1">¡Feliz Cumpleaños,</div>
              <div className="line2">Mary!</div>
            </div>
            <div className={'divider'+(revealed?' show':'')} />
            <div className={'message'+(revealed?' show':'')}>
              <p>
                Que hoy tengas un día tan bonito como tú.
                Lleno de amor, alegría y momentos inolvidables.
              </p>
              <p>
                🎂 ¡Que te la pases <span className="highlight">súper</span>! 🎂
              </p>
            </div>
            <button className={'music-ctrl'+(revealed?' show':'')+(musicPlaying?' playing':'')}
              onClick={toggleMusic} aria-label="Reproducir o detener música">
              <span className="music-ctrl-icon">
                {musicPlaying ? '⏹' : '🎵'}
              </span>
              <span>{musicPlaying ? 'Detener' : 'Reproducir canción'}</span>
              {musicPlaying && (
                <span style={{display:'inline-flex',alignItems:'center',gap:'2px',marginLeft:'4px'}}>
                  <span className="pulse-dot"></span>
                  <span className="pulse-dot"></span>
                  <span className="pulse-dot"></span>
                </span>
              )}
            </button>
          </>
        )}
      </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
